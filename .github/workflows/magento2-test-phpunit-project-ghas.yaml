name: PHPUnit Tests - Project (GHAS)

on:
  workflow_call:
    inputs:
      project_path:
        description: 'Path (within the checked-out repo) to run composer install / phpunit from - defaults to the repo root, override to point at a nested fixture'
        required: false
        type: string
        default: '.'
      test_directory:
        description: 'Glob (relative to project_path, resolved by PHPUnit natively) matching unit test directories to run'
        required: false
        type: string
        default: 'app/code/*/*/Test/Unit'
      integration_test_directory:
        description: 'Glob (relative to project_path, resolved by PHPUnit natively) matching integration test directories to run'
        required: false
        type: string
        default: 'app/code/*/*/Test/Integration'
      magento_version:
        description: 'Magento Version to stand up infrastructure against'
        required: false
        type: string
        default: '2.4.8'
      run_unit_tests:
        description: 'Run unit tests (test_directory)'
        required: false
        type: boolean
        default: false
      run_integration_tests:
        description: 'Run Magento integration tests (dev/tests/integration)'
        required: false
        type: boolean
        default: false

jobs:
  compute-software-requirements:
    runs-on: ubuntu-latest
    outputs:
      composer: ${{ steps.compute-software-requirements.outputs.composer }}
      php: ${{ steps.compute-software-requirements.outputs.php }}
      mysql: ${{ steps.compute-software-requirements.outputs.mysql }}
      mariadb: ${{ steps.compute-software-requirements.outputs.mariadb }}
      elasticsearch: ${{ steps.compute-software-requirements.outputs.elasticsearch }}
      opensearch: ${{ steps.compute-software-requirements.outputs.opensearch }}
      redis: ${{ steps.compute-software-requirements.outputs.redis }}
      valkey: ${{ steps.compute-software-requirements.outputs.valkey }}
      apache: ${{ steps.compute-software-requirements.outputs.apache }}
      nginx: ${{ steps.compute-software-requirements.outputs.nginx }}
      varnish: ${{ steps.compute-software-requirements.outputs.varnish }}
      rabbitmq: ${{ steps.compute-software-requirements.outputs.rabbitmq }}
      activemq_artemis: ${{ steps.compute-software-requirements.outputs.activemq_artemis }}
    steps:
      # OWNER/REPO/PATH@REF instead of checkout + `uses: ./` - a plain checkout of this
      # step's own repo actually checks out whatever repo is CALLING this reusable workflow,
      # not the repo the workflow file itself lives in (GitHub has no context variable
      # exposing that).
      - name: Compute Software Requirements
        id: compute-software-requirements
        uses: samjuk/github-actions/.github/actions/magento/compute-software-requirements@master
        with:
          magento_version: ${{ inputs.magento_version }}

  phpunit-test:
    name: PHPUnit Test
    runs-on: ubuntu-latest
    needs: compute-software-requirements
    container:
      image: samjuk/magento-base-ci-testing-env:${{ needs.compute-software-requirements.outputs.php }}
      # https://github.com/actions/runner/issues/878#issuecomment-1290921350
      options:
        --user 1001:1001
        -v "${{github.workspace}}":"${{github.workspace}}"
    services:
      mysql:
        image: mysql:${{ needs.compute-software-requirements.outputs.mysql }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: magento
        ports:
          - 3306:3306
        options: --tmpfs /tmp:rw --tmpfs /var/lib/mysql:rw --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:${{ needs.compute-software-requirements.outputs.redis }}
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
      elasticsearch:
        image: docker.io/wardenenv/opensearch:${{ needs.compute-software-requirements.outputs.opensearch }}
        ports:
          - 9200:9200
        env:
          'discovery.type': single-node
          # xpack.security.enabled is an Elasticsearch-only setting; OpenSearch
          # doesn't recognise it and crashes on boot if it's set - removed.
          'ES_JAVA_OPTS': "-Xms512m -Xmx1g"
          # This image's security plugin enforces HTTPS + basic auth by default, which
          # Magento's installer never speaks. See magento2-test-phpunit-module-ghas.yaml
          # for the full story - same fix applies here.
          'DISABLE_SECURITY_PLUGIN': 'true'
        options: --health-cmd="curl localhost:9200/_cluster/health?wait_for_status=yellow&timeout=60s" --health-start-period=7s --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Environment Information
        run: |
          php -v
          composer --version

      - name: Checkout Project
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Project and dependencies
        working-directory: ${{ inputs.project_path }}
        env:
          COMPOSER_NO_SECURITY_BLOCKING: 1
        run: |
          composer install

      - name: Detect PHPUnit Flags
        id: phpunit-flags
        working-directory: ${{ inputs.project_path }}
        run: |
          # --display-all-issues was added in PHPUnit 10; older Magento versions (2.4.6/2.4.7)
          # pin PHPUnit 9.x and reject the flag outright. Detect at runtime rather than mapping
          # magento_version -> phpunit major, since that mapping is Magento's to change.
          PHPUNIT_MAJOR=$(vendor/bin/phpunit --version | grep -oE 'PHPUnit [0-9]+' | grep -oE '[0-9]+')
          FLAGS=""
          [ "$PHPUNIT_MAJOR" -ge 10 ] && FLAGS="--display-all-issues"
          echo "flags=${FLAGS}" >> "$GITHUB_OUTPUT"

      - name: Configure Unit Test Suite
        if: ${{ inputs.run_unit_tests }}
        working-directory: ${{ inputs.project_path }}
        run: |
          # PHPUnit's <directory> element natively resolves glob patterns (e.g.
          # ../../../app/code/*/*/Test/Unit) - injecting a suite scoped to just that into
          # dev/tests/unit/phpunit.xml.dist reuses Magento's own bootstrap/autoload
          # wiring without pulling in the stock suite's vendor/magento/module-*
          # entries (that would run every core module's own unit tests too).
          cat > /tmp/testsuite-unit.xml << EOF
                  <testsuite name="Project_Unit_Tests">
                      <directory>../../../${{ inputs.test_directory }}</directory>
                  </testsuite>
          EOF
          sed -i '/<testsuites>/r /tmp/testsuite-unit.xml' dev/tests/unit/phpunit.xml.dist
          # PHPUnit 12 (Magento 2.4.9) implicitly enables failOnEmptyTestSuite when
          # --testsuite is passed - default it off so a project with genuinely zero
          # app/code unit tests doesn't hard-fail.
          if ! grep -q 'failOnEmptyTestSuite=' dev/tests/unit/phpunit.xml.dist; then
            sed -i 's|<phpunit |<phpunit failOnEmptyTestSuite="false" |' dev/tests/unit/phpunit.xml.dist
          fi
          # Allure's bootstrap fails without a config file it never ships by default,
          # turning a clean pass into "OK, but there were issues!" (exit 1).
          # See https://github.com/magento/magento2/issues/36702
          sed -i '/<extensions>/,/<\/extensions>/d' dev/tests/unit/phpunit.xml.dist

      - name: Run Unit Tests
        if: ${{ inputs.run_unit_tests }}
        working-directory: ${{ inputs.project_path }}
        run: |
          vendor/bin/phpunit ${{ steps.phpunit-flags.outputs.flags }} -c dev/tests/unit/phpunit.xml.dist --testsuite Project_Unit_Tests

      - name: Run DI Compile
        working-directory: ${{ inputs.project_path }}
        run: |
          # A bare composer install never populates app/etc/config.php, so every
          # module (including core ones) reads as disabled until enabled explicitly.
          php bin/magento module:enable --all
          php bin/magento setup:di:compile

      - name: Configure Integration Test Database
        if: ${{ inputs.run_integration_tests }}
        working-directory: ${{ inputs.project_path }}
        run: |
          cp dev/tests/integration/etc/install-config-mysql.php.dist dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'db-host' => '.*'/'db-host' => 'mysql'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'db-user' => '.*'/'db-user' => 'root'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'db-password' => '.*'/'db-password' => 'root'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'db-name' => '.*'/'db-name' => 'magento'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'opensearch-host' => '.*'/'opensearch-host' => 'elasticsearch'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'amqp-host' => '.*'/'amqp-host' => ''/" dev/tests/integration/etc/install-config-mysql.php

      - name: Skip DB Dump Cache
        if: ${{ inputs.run_integration_tests }}
        working-directory: ${{ inputs.project_path }}
        run: |
          # Post-install, Magento tries to mysqldump the schema for reuse by a later run -
          # never read back within one job anyway. Pre-creating the dump file at its
          # deterministic, content-hashed path short-circuits the attempt entirely.
          cd dev/tests/integration
          SANDBOX_HASH=$(php -r "echo hash('sha256', sha1_file('etc/install-config-mysql.php'));")
          mkdir -p "tmp/sandbox-0-${SANDBOX_HASH}"
          touch "tmp/sandbox-0-${SANDBOX_HASH}/setup_dump_magento.sql"

      - name: Fix ps for Memory Stats
        if: ${{ inputs.run_integration_tests }}
        working-directory: ${{ inputs.project_path }}
        run: |
          # PHPUnit's shutdown hook shells out to `ps --pid X --format rss --no-headers` for a
          # memory stat, which busybox's ps doesn't support - shim it via /proc/<pid>/status
          # instead of crashing the whole run over cosmetic output nothing reads back.
          mkdir -p "${{ github.workspace }}/.ci-bin"
          cat > "${{ github.workspace }}/.ci-bin/ps" <<'SCRIPT'
          #!/bin/sh
          if [ "$1" = "--pid" ]; then
            pid="$2"
            awk '/^VmRSS:/ { print $2 }' "/proc/$pid/status"
            exit 0
          fi
          exec /bin/ps "$@"
          SCRIPT
          chmod +x "${{ github.workspace }}/.ci-bin/ps"
          echo "${{ github.workspace }}/.ci-bin" >> "$GITHUB_PATH"

      - name: Configure Integration Test Suite
        if: ${{ inputs.run_integration_tests }}
        working-directory: ${{ inputs.project_path }}
        run: |
          # Same technique as the unit suite - the stock "Magento Integration Tests Real
          # Suite" also includes Magento's own core testsuite/ directory, which would run
          # the entire core integration suite alongside app/code's.
          cat > /tmp/testsuite-integration.xml << EOF
                  <testsuite name="Project_Integration_Tests">
                      <directory>../../../${{ inputs.integration_test_directory }}</directory>
                  </testsuite>
          EOF
          sed -i '/<testsuites>/r /tmp/testsuite-integration.xml' dev/tests/integration/phpunit.xml.dist
          if ! grep -q 'failOnEmptyTestSuite=' dev/tests/integration/phpunit.xml.dist; then
            sed -i 's|<phpunit |<phpunit failOnEmptyTestSuite="false" |' dev/tests/integration/phpunit.xml.dist
          fi
          # See https://github.com/magento/magento2/issues/36702
          sed -i '/<extensions>/,/<\/extensions>/d' dev/tests/integration/phpunit.xml.dist

      - name: Run Integration Tests
        if: ${{ inputs.run_integration_tests }}
        working-directory: ${{ inputs.project_path }}
        run: |
          cd dev/tests/integration
          ../../../vendor/bin/phpunit ${{ steps.phpunit-flags.outputs.flags }} -c phpunit.xml.dist --testsuite Project_Integration_Tests
