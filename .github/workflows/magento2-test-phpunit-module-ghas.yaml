name: PHPUnit Tests - Module (GHAS)

on:
  workflow_call:
    inputs:
      module_path:
        description: 'Path (within the checked-out repo) containing the module composer.json - defaults to the repo root, override to point at a nested fixture. Test/Unit and Test/Integration are expected as subdirectories of this path.'
        required: false
        type: string
        default: './extensions/${{ github.event.repository.name }}'
      magento_version:
        description: 'Magento Version to test against'
        required: false
        type: string
        default: '2.4.8'
      magento_repository:
        description: 'Magento Repository to use'
        required: false
        type: string
        default: 'https://mage-os.hypernode.com/mirror/'
      run_unit_tests:
        description: 'Run unit tests (module_path/Test/Unit)'
        required: false
        type: boolean
        default: false
      run_integration_tests:
        description: 'Run Magento integration tests (module_path/Test/Integration)'
        required: false
        type: boolean
        default: false

jobs:
  compute-software-requirements:
    runs-on: ubuntu-latest
    outputs:
      composer: ${{ steps.compute-software-requirements.outputs.composer }}
      php: ${{ steps.compute-software-requirements.outputs.php }}
      mysql: ${{ steps.compute-software-requirements.outputs.mysql }}
      mariadb: ${{ steps.compute-software-requirements.outputs.mariadb }}
      elasticsearch: ${{ steps.compute-software-requirements.outputs.elasticsearch }}
      opensearch: ${{ steps.compute-software-requirements.outputs.opensearch }}
      redis: ${{ steps.compute-software-requirements.outputs.redis }}
      valkey: ${{ steps.compute-software-requirements.outputs.valkey }}
      apache: ${{ steps.compute-software-requirements.outputs.apache }}
      nginx: ${{ steps.compute-software-requirements.outputs.nginx }}
      varnish: ${{ steps.compute-software-requirements.outputs.varnish }}
      rabbitmq: ${{ steps.compute-software-requirements.outputs.rabbitmq }}
      activemq_artemis: ${{ steps.compute-software-requirements.outputs.activemq_artemis }}
    steps:
      # Referenced OWNER/REPO/PATH@REF instead of checking out + `uses: ./` - the
      # `access_level: user` grant already resolves this workflow's own YAML cross-repo,
      # and this uses the same mechanism, unlike an explicit `actions/checkout` of a
      # different private repo (separate permission model, default GITHUB_TOKEN can't do it -
      # confirmed via a 404 against the first cross-repo consumer to hit this).
      - name: Compute Software Requirements
        id: compute-software-requirements
        uses: samjuk/github-actions/.github/actions/magento/compute-software-requirements@master
        with:
          magento_version: ${{ inputs.magento_version }}


  phpunit-test:
    runs-on: ubuntu-latest
    needs: compute-software-requirements
    container:
      image: samjuk/magento-ci-testing-env:${{ inputs.magento_version }}-php${{ needs.compute-software-requirements.outputs.php }}
      # https://github.com/actions/runner/issues/878#issuecomment-1290921350
      options:
        --user 1001:1001
        -v "${{github.workspace}}":"${{github.workspace}}"
    services:
      mysql:
        image: mysql:${{ needs.compute-software-requirements.outputs.mysql }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: magento
        ports:
          - 3306:3306
        options: --tmpfs /tmp:rw --tmpfs /var/lib/mysql:rw --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:${{ needs.compute-software-requirements.outputs.redis }}
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
      elasticsearch:
        image: docker.io/wardenenv/opensearch:${{ needs.compute-software-requirements.outputs.opensearch }}
        ports:
          - 9200:9200
        env:
          'discovery.type': single-node
          # xpack.security.enabled is an Elasticsearch-only setting; OpenSearch
          # doesn't recognise it and crashes on boot if it's set - removed.
          # 512m max was fine when this only ever served unit tests (no real Magento
          # install touches it); run_integration_tests now runs a real ~1575-module
          # setup:install, so headroom is bumped for whatever indexing work follows.
          'ES_JAVA_OPTS': "-Xms512m -Xmx1g"
          # This image's security plugin enforces HTTPS + basic auth by default, which
          # Magento's installer never speaks (install-config-mysql.php only configures a
          # plain host/port). Verified locally: plain HTTP gets "empty reply from server"
          # with security on, and status:green once disabled - this is what was actually
          # behind "No alive nodes found in your cluster" during setup:install.
          'DISABLE_SECURITY_PLUGIN': 'true'
        options: --health-cmd="curl localhost:9200/_cluster/health?wait_for_status=yellow&timeout=60s" --health-start-period=7s --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      # https://github.com/actions/runner/issues/878#issuecomment-1290921350
      - name: Github Jank
        run: cp -R /var/www/html/* ${{ github.workspace }}/

      - name: Environment Information
        run: |
          php -v
          composer --version

      - name: Checkout Local Actions
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          path: ./extensions/${{ github.event.repository.name }}

      - name: Check Test Directories
        id: test-dirs
        run: |
          UNIT_EXISTS=false
          [ -d "${{ inputs.module_path }}/Test/Unit" ] && UNIT_EXISTS=true
          INTEGRATION_EXISTS=false
          [ -d "${{ inputs.module_path }}/Test/Integration" ] && INTEGRATION_EXISTS=true
          echo "unit_exists=${UNIT_EXISTS}" >> "$GITHUB_OUTPUT"
          echo "integration_exists=${INTEGRATION_EXISTS}" >> "$GITHUB_OUTPUT"

          UNIT_WILL_RUN=false
          [ "${{ inputs.run_unit_tests }}" = "true" ] && [ "$UNIT_EXISTS" = "true" ] && UNIT_WILL_RUN=true
          INTEGRATION_WILL_RUN=false
          [ "${{ inputs.run_integration_tests }}" = "true" ] && [ "$INTEGRATION_EXISTS" = "true" ] && INTEGRATION_WILL_RUN=true

          if { [ "${{ inputs.run_unit_tests }}" = "true" ] || [ "${{ inputs.run_integration_tests }}" = "true" ]; } \
             && [ "$UNIT_WILL_RUN" = "false" ] && [ "$INTEGRATION_WILL_RUN" = "false" ]; then
            echo "::error::Tests were requested (run_unit_tests/run_integration_tests) but neither Test/Unit nor Test/Integration exists at ${{ inputs.module_path }}."
            exit 1
          fi

      - name: Install Module via Composer
        env:
          COMPOSER_NO_SECURITY_BLOCKING: 1
        run: |
          EXT_NAME=$(jq -r '.name' "${{ inputs.module_path }}/composer.json")
          composer config repositories.local path "${{ inputs.module_path }}"
          composer require -W --prefer-source "${EXT_NAME}:@dev"

      - name: Detect PHPUnit Flags
        id: phpunit-flags
        run: |
          # --display-all-issues was added in PHPUnit 10; older Magento versions (2.4.6/2.4.7)
          # pin PHPUnit 9.x and reject the flag outright. Detect at runtime rather than mapping
          # magento_version -> phpunit major, since that mapping is Magento's to change.
          PHPUNIT_MAJOR=$(vendor/bin/phpunit --version | grep -oE 'PHPUnit [0-9]+' | grep -oE '[0-9]+')
          FLAGS=""
          [ "$PHPUNIT_MAJOR" -ge 10 ] && FLAGS="--display-all-issues"
          echo "flags=${FLAGS}" >> "$GITHUB_OUTPUT"

      - name: Run Unit Tests
        if: ${{ inputs.run_unit_tests && steps.test-dirs.outputs.unit_exists == 'true' }}
        run: |
          vendor/bin/phpunit ${{ steps.phpunit-flags.outputs.flags }} "${{ inputs.module_path }}/Test/Unit"

      - name: Run DI Compile
        run: |
          php bin/magento setup:di:compile

      - name: Configure Integration Test Database
        if: ${{ inputs.run_integration_tests && steps.test-dirs.outputs.integration_exists == 'true' }}
        run: |
          cp dev/tests/integration/etc/install-config-mysql.php.dist dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'db-host' => '.*'/'db-host' => 'mysql'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'db-user' => '.*'/'db-user' => 'root'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'db-password' => '.*'/'db-password' => 'root'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'db-name' => '.*'/'db-name' => 'magento'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'opensearch-host' => '.*'/'opensearch-host' => 'elasticsearch'/" dev/tests/integration/etc/install-config-mysql.php
          sed -i "s/'amqp-host' => '.*'/'amqp-host' => ''/" dev/tests/integration/etc/install-config-mysql.php

      - name: Skip DB Dump Cache
        if: ${{ inputs.run_integration_tests && steps.test-dirs.outputs.integration_exists == 'true' }}
        run: |
          # Post-install, Magento tries to mysqldump the schema for reuse by a later run -
          # never read back within one job anyway. Pre-creating the dump file at its
          # deterministic, content-hashed path short-circuits the attempt entirely.
          cd dev/tests/integration
          SANDBOX_HASH=$(php -r "echo hash('sha256', sha1_file('etc/install-config-mysql.php'));")
          mkdir -p "tmp/sandbox-0-${SANDBOX_HASH}"
          touch "tmp/sandbox-0-${SANDBOX_HASH}/setup_dump_magento.sql"

      - name: Fix ps for Memory Stats
        if: ${{ inputs.run_integration_tests && steps.test-dirs.outputs.integration_exists == 'true' }}
        run: |
          # PHPUnit's shutdown hook shells out to `ps --pid X --format rss --no-headers` for a
          # memory stat, which busybox's ps doesn't support - shim it via /proc/<pid>/status
          # instead of crashing the whole run over cosmetic output nothing reads back.
          mkdir -p "${{ github.workspace }}/.ci-bin"
          cat > "${{ github.workspace }}/.ci-bin/ps" <<'SCRIPT'
          #!/bin/sh
          if [ "$1" = "--pid" ]; then
            pid="$2"
            awk '/^VmRSS:/ { print $2 }' "/proc/$pid/status"
            exit 0
          fi
          exec /bin/ps "$@"
          SCRIPT
          chmod +x "${{ github.workspace }}/.ci-bin/ps"
          echo "${{ github.workspace }}/.ci-bin" >> "$GITHUB_PATH"

      - name: Run Integration Tests
        if: ${{ inputs.run_integration_tests && steps.test-dirs.outputs.integration_exists == 'true' }}
        run: |
          cd dev/tests/integration
          ../../../vendor/bin/phpunit ${{ steps.phpunit-flags.outputs.flags }} "../../../${{ inputs.module_path }}/Test/Integration"
